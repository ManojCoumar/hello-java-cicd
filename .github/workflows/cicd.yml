name: CI CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Java 17
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17
        
    - name: Make mvnw executable
      run: chmod +x mvnw
      
    - name: Build with Maven
      run: ./mvnw clean package

    - name: Run Tests
      run: ./mvnw test

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar


  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: target

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/hello-java:latest .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/hello-java:latest

  deploy-to-k8s:
    needs: docker-build-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Start Minikube
        uses: medyagh/setup-minikube@master
        with:
          minikube-version: 'latest'
          driver: docker

      - name: Verify Minikube is running
        run: |
          kubectl get nodes
          minikube status

      - name: Pull Docker image into Minikube
        run: |
          eval $(minikube docker-env)
          docker pull manojravichandiran/hello-java:latest

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/hello-java --timeout=120s
          kubectl get pods
          kubectl get services
